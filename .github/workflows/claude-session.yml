name: Claude Research Session

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      task:
        description: 'Specific task for Claude (optional, defaults to highest-priority open question)'
        required: false
        type: string

# Only one session at a time — queue if another is running
concurrency:
  group: claude-session
  cancel-in-progress: false

jobs:
  session:
    runs-on: ubuntu-latest
    # Don't trigger on commits by the bot (prevents infinite loops)
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.head_commit.author.name != 'claude-bot'
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for git log

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Setup machine identity
        run: |
          echo "ci-github" > .machine-id
          # Register if first run
          if [ ! -d "agents/ci-github" ]; then
            python3 agents/processor.py --register
            git add agents/ci-github/
          fi

      - name: Configure git
        run: |
          git config user.name "claude-bot"
          git config user.email "claude-bot@users.noreply.github.com"

      - name: Run Claude session
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          TASK="${{ github.event.inputs.task }}"
          if [ -z "$TASK" ]; then
            TASK="Follow the CLAUDE.md startup sequence exactly. Work on the highest-priority open question or respond to any messages in your inbox. When finished, write a session letter, update SESSION-LOG.md, commit, and push."
          fi

          claude -p "$TASK" \
            --model claude-sonnet-4-6 \
            --max-turns 50 \
            --allowedTools "Bash(git *),Bash(python3 *),Read,Write,Edit,Glob,Grep"

      - name: Push if there are changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            # Only commit if staged changes exist (claude may have already committed)
            git diff --cached --quiet || git commit -m "ci-github-$(date +%Y-%m-%d)-S1: automated session

          Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>"
            git push
          fi
